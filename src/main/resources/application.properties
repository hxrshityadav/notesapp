spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notesapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Prince123@}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

jwt.secret=myVerySecureSecretKeyForJwtAuthentication123456789
jwt.expiration=86400000

# Enforce snake_case for all JSON request/responses (e.g. access_token, created_at)
spring.jackson.property-naming-strategy=SNAKE_CASE

# Configure Swagger/OpenAPI path to match assignment spec
springdoc.api-docs.path=/openapi.json
springdoc.swagger-ui.path=/swagger-ui.html